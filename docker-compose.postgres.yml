services:
  postgres:
    image: postgres:16
    container_name: sparkflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sparkflow
      POSTGRES_PASSWORD: sparkflow
      POSTGRES_DB: sparkflow
    ports:
      - "5432:5432"
    volumes:
      - sparkflow-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparkflow -d sparkflow"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  sparkflow-postgres-data:
